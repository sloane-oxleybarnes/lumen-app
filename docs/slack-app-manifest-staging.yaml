display_information:
  name: Beckett Staging
  description: Neurodivergent workplace communication coaching in Slack.
  background_color: "#f3e6cf"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  agent_view:
    agent_description: Beckett is a neurodivergent workplace communication coach that helps you decode messages, draft clearer replies, rewrite responses, and prep or practice difficult conversations.
    suggested_prompts:
      - title: Decode a Selected Message
        message: Show me how to decode a specific Slack message with Beckett.
      - title: Respond to a Selected Message
        message: Show me how to draft a response from a specific Slack message with Beckett.
      - title: Edit a Draft
        message: Help me rewrite this draft so it is clearer and kinder.
      - title: Prep / Practice
        message: Help me prepare for a difficult conversation.
  bot_user:
    display_name: Beckett Staging
    always_online: false
  slash_commands:
    - command: /beckett
      description: Respond, rewrite, decode, prep, or practice workplace conversations.
      url: https://www.meetbeckett.co/api/slack/commands
      should_escape: false
  shortcuts:
    - name: Beckett - Decode
      type: message
      callback_id: beckett_message_decode
      description: Decode tone, meaning, and what to pay attention to in this message.
    - name: Beckett - Respond
      type: message
      callback_id: beckett_message_respond
      description: Draft clear private response options for this message.
oauth_config:
  redirect_urls:
    - https://www.meetbeckett.co/api/slack/callback
  scopes:
    bot:
      - commands
      - chat:write
      - assistant:write
      - im:history
      - im:write
    user:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - users:read
      - search:read.public
      - search:read.private
      - search:read.im
      - search:read.mpim
      - search:read.users
settings:
  event_subscriptions:
    request_url: https://www.meetbeckett.co/api/slack/events
    bot_events:
      - app_home_opened
      - app_context_changed
      - message.im
  interactivity:
    is_enabled: true
    request_url: https://www.meetbeckett.co/api/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
