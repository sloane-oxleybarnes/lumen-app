display_information:
  name: Beckett Staging
  description: Workplace communication coaching for Slack testing.
  background_color: "#f3e6cf"
features:
  bot_user:
    display_name: Beckett Staging
    always_online: false
  slash_commands:
    - command: /beckett
      description: Ask Beckett for workplace communication coaching.
      url: https://beckett-git-staging-sloane-s-projects1.vercel.app/api/slack/commands
      should_escape: false
  shortcuts:
    - name: Ask Beckett
      type: message
      callback_id: beckett_message_context
      description: Get private coaching on this Slack message.
oauth_config:
  redirect_urls:
    - https://beckett-git-staging-sloane-s-projects1.vercel.app/api/slack/callback
  scopes:
    bot:
      - commands
      - chat:write
    user:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - users:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://beckett-git-staging-sloane-s-projects1.vercel.app/api/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
