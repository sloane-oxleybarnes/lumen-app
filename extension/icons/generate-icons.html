<!DOCTYPE html>
<html>
<head><title>Generate Lumen Icons</title></head>
<body>
<p>Click the buttons below to download each icon file. Save them as icon16.png, icon48.png, and icon128.png in this folder.</p>
<div id="previews"></div>
<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background circle
  ctx.fillStyle = '#BA7517';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.22);
  ctx.fill();

  // Sun glyph — simple circle + rays
  const cx = size / 2, cy = size / 2, r = size * 0.22;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  const rayLen = size * 0.12;
  const rayWidth = size * 0.06;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = rayWidth;
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const angle = (i * Math.PI * 2) / 8;
    const inner = r + size * 0.06;
    const outer = inner + rayLen;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
    ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
    ctx.stroke();
  }

  return canvas;
}

const previews = document.getElementById('previews');
[16, 48, 128].forEach(size => {
  const canvas = makeIcon(size);
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download icon${size}.png`;
  link.style.cssText = 'display:block;margin:10px 0;font-family:sans-serif;font-size:14px;';
  previews.appendChild(canvas);
  previews.appendChild(link);
});
</script>
</body>
</html>
